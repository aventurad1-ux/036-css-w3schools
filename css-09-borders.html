<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CSS Borders</title>

    <style>
        .solido {
            border: 2px solid black;
        }

        .punteado {
            border: 3px dotted blue;
        }

        .rayado {
            border: 3px dashed red;
        }

        .redondeado {
            border: 2px solid green;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>Bordes en CSS</h1>

    <p class="solido">Este párrafo tiene un borde sólido.</p>

    <p class="punteado">Este párrafo tiene un borde punteado.</p>

    <p class="rayado">Este párrafo tiene un borde de líneas.</p>

    <p class="redondeado">Este párrafo tiene las esquinas redondeadas.</p>

</body>
</html>
