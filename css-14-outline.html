<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CSS Outline</title>

    <style>
        p {
            border: 2px solid black;
            outline: 4px solid red;
            padding: 15px;
            margin: 30px;
        }
    </style>
</head>

<body>

    <h1>Outline</h1>

    <p>
        Este párrafo tiene un borde y un outline de color rojo.
    </p>

</body>
</html>
