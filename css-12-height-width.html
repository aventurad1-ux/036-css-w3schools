    <title>CSS Height and Width</title>

        div {

            width: 300px;
            background-color: lightblue;
            border: 2px solid blue;
        }

</head>

    <h1>Height y Width</h1>

    <div>
        Esta caja tiene un ancho de 300 píxeles y una altura de 150 píxeles.
    </div>

</body>
</html>
