<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CSS Text</title>

    <style>
        h1 {
            color: darkblue;
            text-align: center;
            text-transform: uppercase;
        }

        p {
            color: gray;
            text-align: justify;
            text-indent: 30px;
            letter-spacing: 1px;
            line-height: 1.8;
        }
    </style>
</head>

<body>

    <h1>Texto en CSS</h1>

    <p>
        CSS permite modificar la apariencia del texto utilizando diferentes propiedades como color, alineación, espaciado entre letras y altura entre líneas para mejorar la presentación del contenido.
    </p>

</body>
</html>
