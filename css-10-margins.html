<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CSS Margins</title>

    <style>
        body {
            background-color: lightgray;
        }

        .caja1 {
            background-color: lightblue;
            border: 2px solid blue;
            margin: 30px;
        }

        .caja2 {
            background-color: lightgreen;
            border: 2px solid green;
            margin-top: 50px;
            margin-left: 80px;
        }
    </style>
</head>

<body>

    <h1>Márgenes en CSS</h1>

    <div class="caja1">
        Esta caja tiene un margen de 30 píxeles.
    </div>

    <div class="caja2">
        Esta caja tiene margen superior e izquierdo.
    </div>

</body>
</html>
