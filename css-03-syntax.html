<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CSS Syntax</title>

    <style>
        h1 {
            color: darkred;
            text-align: center;
        }

        p {
            color: gray;
        }
    </style>
</head>

<body>

    <h1>Sintaxis de CSS</h1>

    <p>Una regla CSS está formada por un selector y un bloque de declaraciones.</p>

    <p>Las propiedades y valores se escriben entre llaves.</p>

</body>
</html>
