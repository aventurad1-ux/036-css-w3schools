<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CSS Colors</title>

    <style>
        h1 {
            color: blue;
        }

        .nombre {
            color: tomato;
        }

        .hexadecimal {
            color: #008000;
        }

        .rgb {
            color: rgb(128, 0, 128);
        }

        .fondo {
            background-color: lightblue;
            color: black;
        }
    </style>
</head>

<body>

    <h1>Colores en CSS</h1>

    <p class="nombre">Este texto utiliza un color por nombre.</p>

    <p class="hexadecimal">Este texto utiliza un color hexadecimal.</p>

    <p class="rgb">Este texto utiliza un color RGB.</p>

    <p class="fondo">Este párrafo tiene un color de fondo.</p>

</body>
</html>
