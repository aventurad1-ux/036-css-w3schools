<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CSS Selectors</title>

    <style>
        h1 {
            color: navy;
        }

        .texto {
            color: green;
        }

        #especial {
            color: red;
        }
    </style>
</head>

<body>

    <h1>Selectores CSS</h1>

    <p class="texto">Este párrafo utiliza un selector de clase.</p>

    <p id="especial">Este párrafo utiliza un selector por id.</p>

    <p>Este párrafo no tiene ninguna clase.</p>

</body>
</html>
