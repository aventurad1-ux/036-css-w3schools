<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CSS Padding</title>

    <style>
        .caja1 {
            background-color: lightblue;
            border: 2px solid blue;
            padding: 20px;
        }

        .caja2 {
            background-color: lightyellow;
            border: 2px solid orange;
            padding-top: 30px;
            padding-right: 10px;
            padding-bottom: 20px;
            padding-left: 40px;
        }
    </style>
</head>

<body>

    <h1>Relleno en CSS</h1>

    <div class="caja1">
        Esta caja tiene 20 píxeles de espacio interno.
    </div>

    <br>

    <div class="caja2">
        Esta caja tiene diferente espacio interno en cada lado.
    </div>

</body>
</html>
