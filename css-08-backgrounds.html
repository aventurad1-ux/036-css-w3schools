<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CSS Backgrounds</title>

    <style>
        body {
            background-color: lightgray;
        }

        h1 {
            background-color: darkblue;
            color: white;
        }

        p {
            background-color: lightyellow;
        }

        div {
            background-color: lightgreen;
        }
    </style>
</head>

<body>

    <h1>Fondos en CSS</h1>

    <p>Este párrafo tiene un color de fondo amarillo claro.</p>

    <div>
        Este elemento div tiene un fondo verde claro.
    </div>

</body>
</html>
